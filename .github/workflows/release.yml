name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v1.0.3)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Update manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' \
            custom_components/remote_display_dashboard/manifest.json \
            > /tmp/manifest.json
          mv /tmp/manifest.json custom_components/remote_display_dashboard/manifest.json

      - name: Commit built JS back to main
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/remote_display_dashboard/panel/ \
                  custom_components/remote_display_dashboard/manifest.json
          git diff --staged --quiet || \
            git commit -m "chore: update built JS and manifest for ${REF} [skip ci]"
          git push origin HEAD:main

      - name: Create release zip
        run: zip -r remote_display_dashboard.zip custom_components/remote_display_dashboard/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: remote_display_dashboard.zip
